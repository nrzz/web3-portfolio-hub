name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      push_images:
        description: 'Push images to GHCR (requires package write permission)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  pre-deploy-tests:
    name: Pre-Deployment Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Run backend tests
        run: |
          cd backend
          go mod download
          go test -v ./...
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb?sslmode=disable

      - name: Build backend
        run: |
          cd backend
          go build -v -o web3-portfolio-backend ./main.go

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Verify builds
        run: |
          test -f backend/web3-portfolio-backend && echo "Backend built"
          test -d frontend/dist && echo "Frontend built"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/web3-portfolio-backend
            frontend/dist/
          retention-days: 7

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [pre-deploy-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: inputs.push_images
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ inputs.push_images }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/web3-portfolio-hub-backend:latest
            ghcr.io/${{ github.repository_owner }}/web3-portfolio-hub-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ inputs.push_images }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/web3-portfolio-hub-frontend:latest
            ghcr.io/${{ github.repository_owner }}/web3-portfolio-hub-frontend:${{ github.sha }}

  deploy-self-hosted:
    name: Deploy to Self-Hosted Server
    runs-on: ubuntu-latest
    needs: [build-docker]

    steps:
      - name: Check deploy secrets
        id: deploy
        run: |
          if [ -n "$SSH_KEY" ] && [ -n "$HOST" ] && [ -n "$USER" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "Deploy secrets not configured — skipping deployment."
          fi
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}

      - uses: actions/checkout@v4
        if: steps.deploy.outputs.configured == 'true'

      - name: Setup SSH
        if: steps.deploy.outputs.configured == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        if: steps.deploy.outputs.configured == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        if: steps.deploy.outputs.configured == 'true'
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd /opt/web3-portfolio-hub || mkdir -p /opt/web3-portfolio-hub && cd /opt/web3-portfolio-hub
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/web3-portfolio-hub-backend:latest
            docker pull ghcr.io/${{ github.repository_owner }}/web3-portfolio-hub-frontend:latest
            docker-compose -f docker-compose.prod.yml down || true
            docker-compose -f docker-compose.prod.yml up -d --build
            sleep 30
            curl -f http://localhost:8080/api/health
            curl -f http://localhost:3000
            echo "Deployment successful"
          EOF

  verify-ui:
    name: Verify UI in Browser
    runs-on: ubuntu-latest
    needs: [deploy-self-hosted]

    steps:
      - name: Check deploy URL
        id: url
        run: |
          if [ -n "$DEPLOY_URL" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "DEPLOY_URL not set — skipping UI verification."
          fi
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

      - uses: actions/checkout@v4
        if: steps.url.outputs.configured == 'true'

      - name: Setup Node.js
        if: steps.url.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        if: steps.url.outputs.configured == 'true'
        run: npx playwright install chromium --with-deps

      - name: Run UI verification
        if: steps.url.outputs.configured == 'true'
        run: |
          node <<'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            const baseUrl = process.env.DEPLOY_URL;
            await page.goto(baseUrl, { waitUntil: 'networkidle', timeout: 30000 });
            await page.screenshot({ path: 'ui-screenshot.png', fullPage: true });
            await browser.close();
            console.log('UI verification passed');
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

      - name: Upload UI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: ui-screenshot.png
          if-no-files-found: ignore
